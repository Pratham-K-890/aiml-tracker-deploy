# nginx site configuration for the Department Project Tracker.
#
# Place this file at:
#   /etc/nginx/sites-available/project-tracker
# Then enable it:
#   sudo ln -s /etc/nginx/sites-available/project-tracker /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace APP_DIR below with wherever you cloned the repo (default: /opt/project-tracker).
# Replace the server_name with your server's IP address or hostname.

server {
    listen 80;
    server_name _;   # replace with your IP or domain, e.g. 192.168.1.100

    # ── Frontend (built React app) ────────────────────────────────────────────
    root /opt/project-tracker/web/dist;
    index index.html;

    # ── Backend API proxy ─────────────────────────────────────────────────────
    # All /api/, /chatbot/, /health, /docs routes go to FastAPI on port 8000.
    # proxy_read_timeout is generous because chatbot LLM calls can take ~10s.
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 20M;
    }

    location /chatbot/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Any path not matched above is served as index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
